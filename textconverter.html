<main class="container">
  <h1>Text Case Converter</h1>
  <textarea id="text" placeholder="Type or paste your text here..."></textarea>

  <div class="buttons">
    <button onclick="toUpper()">UPPERCASE</button>
    <button onclick="toLower()">lowercase</button>
    <button onclick="toCapital()">Capitalize</button>
    <button onclick="copyText()">Copy</button>
    <button onclick="clearText()">Clear</button>
  </div>
</main>

<script>
function toUpper() {
  document.getElementById("text").value = document.getElementById("text").value.toUpperCase();
}

function toLower() {
  document.getElementById("text").value = document.getElementById("text").value.toLowerCase();
}

function toCapital() {
  document.getElementById("text").value = document.getElementById("text").value.replace(/\b\w/g, function(letter) {
    return letter.toUpperCase();
  });
}

function copyText() {
  const text = document.getElementById("text");
  text.select();
  document.execCommand("copy");
  alert("Text copied!");
}

function clearText() {
  document.getElementById("text").value = "";
}
</script>
