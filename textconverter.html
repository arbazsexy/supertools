<div class="container">

<h1>Text Case Converter</h1>

<textarea id="text" placeholder="Type or paste your text here..."></textarea>

<div class="buttons">

<button onclick="toUpper()">UPPERCASE</button>

<button onclick="toLower()">lowercase</button>

<button onclick="toCapital()">Capitalize Words</button>

<button onclick="sentenceCase()">Sentence case</button>

<button onclick="alternatingCase()">aLtErNaTiNg</button>

<button onclick="copyText()">Copy</button>

<button onclick="clearText()">Clear</button>

</div>

</div>

<footer>
<p>© 2026 SuperTools</p>
</footer>

<script>

function toUpper(){
let text=document.getElementById("text");
text.value=text.value.toUpperCase();
}

function toLower(){
let text=document.getElementById("text");
text.value=text.value.toLowerCase();
}

function toCapital(){
let text=document.getElementById("text");
text.value=text.value.replace(/\b\w/g,l=>l.toUpperCase());
}

function sentenceCase(){
let text=document.getElementById("text");
text.value=text.value.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g,c=>c.toUpperCase());
}

function alternatingCase(){
let text=document.getElementById("text");
let result="";
for(let i=0;i<text.value.length;i++){
result+=i%2?text.value[i].toLowerCase():text.value[i].toUpperCase();
}
text.value=result;
}

function copyText(){
let text=document.getElementById("text").value;

if(text===""){
alert("Nothing to copy");
return;
}

navigator.clipboard.writeText(text);

alert("Text copied!");
}

function clearText(){
document.getElementById("text").value="";
}

</script>
