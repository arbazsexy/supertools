  <div class="container">
    <h1>Age Calculator</h1>
    <label for="birthdate">Select your birth date:</label>
    <input type="date" id="birthdate" aria-label="Enter your birth date">
    <button onclick="calculateAge()">Calculate Age</button>
    <div id="result"></div>
  </div>

  <footer>
    <p>© 2026 SuperTools</p>
  </footer>

  <script>
    function calculateAge() {
      var birthdate = document.getElementById("birthdate").value;
      if (!birthdate) {
        document.getElementById("result").innerHTML = "Please select your birth date";
        return;
      }
      var birth = new Date(birthdate);
      var today = new Date();
      var age = today.getFullYear() - birth.getFullYear();
      var m = today.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
      document.getElementById("result").innerHTML = "You are " + age + " years old.";
    }
  </script>
