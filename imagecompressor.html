<main class="container">
  <h1>Image Compressor</h1>

  <input type="file" id="upload" accept="image/*">
  <button onclick="compressImage()">Compress Image</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" alt="Compressed preview" />

  <a id="download" style="display:none">
    <button>Download Compressed Image</button>
  </a>
</main>

<footer>
  <p>© 2026 SuperTools</p>

<script>
function compressImage() {
  const file = document.getElementById("upload").files[0];
  if (!file) {
    alert("Please upload an image");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      const compressed = canvas.toDataURL("image/jpeg", 0.5);
      document.getElementById("preview").src = compressed;

      const download = document.getElementById("download");
      download.href = compressed;
      download.download = "compressed-image.jpg";
      download.style.display = "inline-block";
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}
</script>
