<div class="container">

<h1>Image Compressor</h1>

<input type="file" id="upload" accept="image/*">

<button onclick="compressImage()">Compress Image</button>

<p id="info"></p>

<canvas id="canvas" style="display:none;"></canvas>

<img id="preview" alt="Compressed preview">

<a id="download" style="display:none">
<button>Download Compressed Image</button>
</a>

<p>© 2026 SuperTools</p>
</footer>

<script>

function compressImage(){

let file=document.getElementById("upload").files[0];

if(!file){
alert("Please upload an image.");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();

img.onload=function(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let compressed=canvas.toDataURL("image/jpeg",0.6);

document.getElementById("preview").src=compressed;

let download=document.getElementById("download");

download.href=compressed;
download.download="compressed-image.jpg";
download.style.display="inline-block";

let originalSize=(file.size/1024).toFixed(1);

let compressedSize=(compressed.length*0.75/1024).toFixed(1);

document.getElementById("info").innerHTML=
"Original Size: <b>"+originalSize+" KB</b><br>"+
"Compressed Size: <b>"+compressedSize+" KB</b>";

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

}

</script>
