<body>

<nav>
  <h2>SuperTools</h2>
  <a href="index.html">Home</a>
</nav>

<main class="container">
  <h1>Unit Converter</h1>

  <input type="number" id="value" placeholder="Enter value">
  
  <select id="fromUnit">
    <option value="meter">Meters</option>
    <option value="kilometer">Kilometers</option>
    <option value="mile">Miles</option>
    <option value="foot">Feet</option>
  </select>

  <select id="toUnit">
    <option value="meter">Meters</option>
    <option value="kilometer">Kilometers</option>
    <option value="mile">Miles</option>
    <option value="foot">Feet</option>
  </select>

  <button onclick="convert()">Convert</button>

  <div id="result">Result will appear here</div>
</main>

<footer>
  <p>© 2026 SuperTools</p>
</footer>

<script>
function convert() {
  const value = parseFloat(document.getElementById("value").value);
  const from = document.getElementById("fromUnit").value;
  const to = document.getElementById("toUnit").value;

  if (isNaN(value)) {
    document.getElementById("result").innerHTML = "Enter a value";
    return;
  }

  let meters;
  if(from === "meter") meters = value;
  if(from === "kilometer") meters = value * 1000;
  if(from === "mile") meters = value * 1609.34;
  if(from === "foot") meters = value * 0.3048;

  let result;
  if(to === "meter") result = meters;
  if(to === "kilometer") result = meters / 1000;
  if(to === "mile") result = meters / 1609.34;
  if(to === "foot") result = meters / 0.3048;

  document.getElementById("result").innerHTML = `Result: ${result.toFixed(4)}`;
}
</script>
