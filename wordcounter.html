<body>
<nav>
  <h2>⚡ SuperTools</h2>
  <a href="/">Home</a>
</nav>

<main class="container">
  <h1>Word Counter</h1>
  <textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

  <div class="stats">
    <div class="stat-box">
      Words: <span id="words">0</span>
    </div>
    <div class="stat-box">
      Characters: <span id="characters">0</span>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 SuperTools</p>
</footer>

<script>
function countText() {
  const text = document.getElementById("text").value;
  const wordsArray = text.trim().split(/\s+/).filter(word => word.length > 0);
  document.getElementById("words").innerText = text.trim() === "" ? 0 : wordsArray.length;
  document.getElementById("characters").innerText = text.length;
}
</script>
