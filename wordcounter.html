<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter - SuperTools</title>
  <meta name="description" content="Count words and characters instantly with SuperTools Word Counter. Fast, free, and easy to use.">

  <!-- Favicon -->
  <link rel="icon" href="logo.png" type="image/png">

  <!-- Open Graph -->
  <meta property="og:title" content="Word Counter - SuperTools">
  <meta property="og:description" content="Count words and characters instantly with SuperTools Word Counter.">
  <meta property="og:image" content="https://example.com/logo.png">
  <meta property="og:url" content="https://example.com/wordcounter.html">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Word Counter - SuperTools">
  <meta name="twitter:description" content="Count words and characters instantly with SuperTools Word Counter.">
  <meta name="twitter:image" content="https://example.com/logo.png">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Word Counter",
    "url": "https://example.com/wordcounter.html",
    "applicationCategory": "Utility",
    "description": "Count words and characters instantly with SuperTools Word Counter.",
    "operatingSystem": "Web",
    "creator": {
      "@type": "Organization",
      "name": "SuperTools",
      "logo": "https://example.com/logo.png"
    }
  }
  </script>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>SuperTools</h2>
  <a href="index.html">Home</a>
</nav>

<main class="container">
  <h1>Word Counter</h1>
  <textarea id="text" placeholder="Type or paste your text here..." oninput="countText()"></textarea>

  <div class="stats">
    <div class="stat-box">
      Words: <span id="words">0</span>
    </div>
    <div class="stat-box">
      Characters: <span id="characters">0</span>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 SuperTools</p>
</footer>

<script>
function countText() {
  const text = document.getElementById("text").value;
  const wordsArray = text.trim().split(/\s+/).filter(word => word.length > 0);
  document.getElementById("words").innerText = text.trim() === "" ? 0 : wordsArray.length;
  document.getElementById("characters").innerText = text.length;
}
</script>

</body>
</html>
