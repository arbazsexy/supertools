<div class="container">

<h1>Random Number Generator</h1>

<input type="number" id="min" placeholder="Minimum number">
<input type="number" id="max" placeholder="Maximum number">
<input type="number" id="count" placeholder="How many numbers?" value="1">

<br><br>

<button onclick="generateNumber()">Generate</button>

<div id="result">0</div>

</div>

<footer>
<p>© 2026 SuperTools</p>
</footer>

<script>

function generateNumber(){

let min=parseInt(document.getElementById("min").value);
let max=parseInt(document.getElementById("max").value);
let count=parseInt(document.getElementById("count").value);

if(isNaN(min)||isNaN(max)){
document.getElementById("result").innerHTML="Enter valid numbers";
return;
}

if(min>max){
document.getElementById("result").innerHTML="Minimum cannot be greater than Maximum";
return;
}

let numbers=[];

for(let i=0;i<count;i++){
let random=Math.floor(Math.random()*(max-min+1))+min;
numbers.push(random);
}

document.getElementById("result").innerHTML=numbers.join(", ");

}

</script>
