<main class="container">
  <h1>Random Number Generator</h1>

  <input type="number" id="min" placeholder="Minimum number">
  <input type="number" id="max" placeholder="Maximum number">
  <button onclick="generateNumber()">Generate</button>

  <div id="result">0</div>
</main>

<footer>
  <p>© 2026 SuperTools</p>
</footer>

<script>
function generateNumber() {
  const min = parseInt(document.getElementById("min").value);
  const max = parseInt(document.getElementById("max").value);

  if (isNaN(min) || isNaN(max)) {
    document.getElementById("result").innerHTML = "Enter numbers";
    return;
  }

  if (min > max) {
    document.getElementById("result").innerHTML = "Min > Max";
    return;
  }

  const random = Math.floor(Math.random() * (max - min + 1)) + min;
  document.getElementById("result").innerHTML = random;
}
</script>
