<div class="container">

<h1>Percentage Calculator</h1>

<h3>1. What is X% of Y?</h3>

<input type="number" id="percent" placeholder="Enter percentage (%)">
<input type="number" id="number" placeholder="Enter number">

<button onclick="calculatePercent()">Calculate</button>

<div id="result"></div>

<br>

<h3>2. Percentage Increase</h3>

<input type="number" id="oldValue" placeholder="Old value">
<input type="number" id="newValue" placeholder="New value">

<button onclick="calculateIncrease()">Calculate Increase</button>

<div id="increaseResult"></div>

<br>

<h3>3. Percentage Decrease</h3>

<input type="number" id="startValue" placeholder="Starting value">
<input type="number" id="endValue" placeholder="Ending value">

<button onclick="calculateDecrease()">Calculate Decrease</button>

<div id="decreaseResult"></div>

</div>

<footer>
<p>© 2026 SuperTools</p>
</footer>

<script>

function calculatePercent(){

let percent=parseFloat(document.getElementById("percent").value);
let number=parseFloat(document.getElementById("number").value);

if(!percent || !number){
document.getElementById("result").innerHTML="Please enter valid numbers.";
return;
}

let result=(percent/100)*number;

document.getElementById("result").innerHTML=
percent+"% of "+number+" = <b>"+result+"</b>";

}

function calculateIncrease(){

let oldValue=parseFloat(document.getElementById("oldValue").value);
let newValue=parseFloat(document.getElementById("newValue").value);

if(!oldValue || !newValue){
document.getElementById("increaseResult").innerHTML="Enter valid numbers.";
return;
}

let increase=((newValue-oldValue)/oldValue)*100;

document.getElementById("increaseResult").innerHTML=
"Increase: <b>"+increase.toFixed(2)+"%</b>";

}

function calculateDecrease(){

let start=parseFloat(document.getElementById("startValue").value);
let end=parseFloat(document.getElementById("endValue").value);

if(!start || !end){
document.getElementById("decreaseResult").innerHTML="Enter valid numbers.";
return;
}

let decrease=((start-end)/start)*100;

document.getElementById("decreaseResult").innerHTML=
"Decrease: <b>"+decrease.toFixed(2)+"%</b>";

}

</script>
